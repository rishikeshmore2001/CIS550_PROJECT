<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apriori Results</title>
</head>
<body>
    <h1>Apriori Algorithm Results</h1>

        {% endfor %}
    </ul>
    <a href="/">Back to Home</a>
</body>
</html>
